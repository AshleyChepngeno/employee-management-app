<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="sidebar">
        <div class="profile">
            <img src="images/profile.jpeg" alt="Profile">
            <div>
                <h4>Ashley Chepngeno</h4>
                <span class="status">&#9679; Online</span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">Add New Contact</a></li>
            <li><a href="view-contacts.html">View All Contacts</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">Add New Contact</div>
        <div class="content">
            <div class="form-container">
                <form action="view-contacts.html">
                    <div class="form-group">
                        <label>ID Number</label>
                        <input type="text" placeholder="Enter Identification Number" required>
                    </div>
                    <div class="form-group">
                        <label>Firstname</label>
                        <input type="text" placeholder="Enter First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Lastname</label>
                        <input type="text" placeholder="Enter Last Name" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="Male" required> Male</label>
                            <label><input type="radio" name="gender" value="Female" required> Female</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" placeholder="+2547--" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter Email" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" placeholder="Enter Address" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" required>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <select required>
                            <option value="">- Select Position if Official -</option>
                            <option value="Manager">Manager</option>
                            <option value="Developer">Developer</option>
                            <option value="Designer">Designer</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label></label>
                        <button type="submit" class="btn btn-details">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
